# Use zsh for new tmux windows and panes.
set-option -g default-shell "$SHELL"
set-option -g default-command "SHELL"

# Terminal capabilities.
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides ",*:Tc"
set-option -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title:RGB,screen*:title,rxvt*:ignorefkeys,tmux*:RGB"

# Usability.
set-option -g mouse on
set-option -g history-limit 50000
set-option -sg escape-time 10
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi
set-option -g renumber-windows on

# Prefix and reload.
set-option -g prefix C-b
bind-key C-b send-prefix
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split panes in the current directory.
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind-key '"'
unbind-key %
